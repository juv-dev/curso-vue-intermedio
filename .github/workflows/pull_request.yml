name: Workflow PR

on:
  pull_request:
    branches: [main]

jobs:
  vulnerability-scan:
    name: vulnerability-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      security-events: write
    steps:
      - uses: juv-dev/workflows-frontend/.github/actions/vulnerability-scan@main

  supply-chain:
    name: supply-chain
    needs: vulnerability-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: juv-dev/workflows-frontend/.github/actions/supply-chain@main

  load-values:
    name: load-values
    needs: supply-chain
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.values.outputs.version }}
      name: ${{ steps.values.outputs.name }}
    steps:
      - uses: juv-dev/workflows-frontend/.github/actions/load-values@main
        id: values

  validate-tag:
    name: validate-tag
    needs: load-values
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: juv-dev/workflows-frontend/.github/actions/validate-tag@main
